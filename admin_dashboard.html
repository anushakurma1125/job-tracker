<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Admin Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1a1d23; padding: 24px 32px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #6c757d; font-size: 0.9rem; margin-bottom: 24px; }
  .config-bar { background: #fff; border: 1px solid #e1e4e8; border-radius: 10px; padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .config-bar label { font-size: 0.85rem; font-weight: 600; color: #6c757d; }
  .config-bar input { flex: 1; min-width: 200px; padding: 6px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 0.85rem; }
  .config-bar button { padding: 6px 16px; border: none; border-radius: 6px; background: #0d6efd; color: #fff; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
  .config-bar button:hover { background: #0b5ed7; }
  #error { color: #dc3545; font-size: 0.85rem; display: none; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .card { background: #fff; border: 1px solid #e1e4e8; border-radius: 10px; padding: 20px; text-align: center; }
  .card .value { font-size: 2rem; font-weight: 700; color: #0d6efd; }
  .card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; font-weight: 600; margin-top: 4px; }

  .section { background: #fff; border: 1px solid #e1e4e8; border-radius: 10px; padding: 20px; margin-top: 24px; }
  .section h3 { font-size: 0.95rem; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; font-weight: 600; padding: 8px 6px; border-bottom: 2px solid #e9ecef; }
  td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }

  .btn-sm { padding: 3px 10px; border: none; border-radius: 4px; font-size: 0.78rem; font-weight: 600; cursor: pointer; }
  .btn-approve { background: #198754; color: #fff; }
  .btn-approve:hover { background: #157347; }
  .btn-reject { background: #dc3545; color: #fff; margin-left: 4px; }
  .btn-reject:hover { background: #bb2d3b; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
  .badge-pending { background: #fff3cd; color: #856404; }
  .badge-approved { background: #d1e7dd; color: #0f5132; }
  .badge-rejected { background: #f8d7da; color: #842029; }
  .badge-registered { background: #cff4fc; color: #055160; }
  .invite-link { font-size: 0.78rem; color: #0d6efd; word-break: break-all; }
  .about-text { max-width: 250px; font-size: 0.8rem; color: #495057; }

  .loading { text-align: center; padding: 60px; color: #6c757d; font-size: 1rem; }
</style>
</head>
<body>

<h1>Admin Dashboard</h1>
<p class="subtitle">Job Tracker usage analytics — private view</p>

<div class="config-bar">
  <label>API URL</label>
  <input id="apiUrl" placeholder="https://your-app.onrender.com" />
  <label>Admin Key</label>
  <input id="adminKey" type="password" placeholder="optional" />
  <button onclick="fetchAll()">Load Data</button>
  <span id="error"></span>
</div>

<div id="dashboard" style="display:none">
  <div class="cards">
    <div class="card"><div class="value" id="v-users">—</div><div class="label">Total Users</div></div>
    <div class="card"><div class="value" id="v-active">—</div><div class="label">Active Users</div></div>
    <div class="card"><div class="value" id="v-jobs">—</div><div class="label">Total Jobs</div></div>
    <div class="card"><div class="value" id="v-resumes">—</div><div class="label">Resumes Uploaded</div></div>
    <div class="card"><div class="value" id="v-scans">—</div><div class="label">Email Scans</div></div>
    <div class="card"><div class="value" id="v-email">—</div><div class="label">Email Integrations</div></div>
  </div>

  <div class="section" id="requestsSection">
    <h3>Access Requests</h3>
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>About</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="requestRows"></tbody>
    </table>
  </div>

  <div class="section">
    <h3>All Users</h3>
    <table>
      <thead><tr><th>#</th><th>Username</th><th>Display Name</th><th>Email</th><th>Jobs</th><th>Joined</th></tr></thead>
      <tbody id="userRows"></tbody>
    </table>
  </div>
</div>

<div id="loadingMsg" class="loading" style="display:none">Loading dashboard data...</div>

<script>
let _baseUrl = '';

const saved = localStorage.getItem('admin_dash_config');
if (saved) {
  const c = JSON.parse(saved);
  document.getElementById('apiUrl').value = c.url || '';
  document.getElementById('adminKey').value = c.key || '';
}

function getHeaders() {
  const key = document.getElementById('adminKey').value.trim();
  const h = {};
  if (key) h['X-Admin-Key'] = key;
  return h;
}

async function fetchAll() {
  const url = document.getElementById('apiUrl').value.replace(/\/+$/, '');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';

  _baseUrl = url || window.location.origin;
  if (!url && window.location.protocol === 'file:') { errEl.textContent = 'Enter your app URL'; errEl.style.display = 'inline'; return; }

  localStorage.setItem('admin_dash_config', JSON.stringify({ url, key: document.getElementById('adminKey').value.trim() }));

  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';

  try {
    const [statsResp, reqResp] = await Promise.all([
      fetch(_baseUrl + '/api/admin/stats', { headers: getHeaders(), credentials: 'include' }),
      fetch(_baseUrl + '/api/admin/access-requests', { headers: getHeaders(), credentials: 'include' })
    ]);
    if (!statsResp.ok) {
      const body = await statsResp.json().catch(() => ({}));
      throw new Error(body.error || `HTTP ${statsResp.status}`);
    }
    const stats = await statsResp.json();
    const requests = reqResp.ok ? await reqResp.json() : [];
    renderDashboard(stats, requests);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'inline';
    document.getElementById('loadingMsg').style.display = 'none';
  }
}

function renderDashboard(d, requests) {
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  document.getElementById('v-users').textContent = d.total_users;
  document.getElementById('v-active').textContent = d.active_users;
  document.getElementById('v-jobs').textContent = d.total_jobs;
  document.getElementById('v-resumes').textContent = d.total_resumes;
  document.getElementById('v-scans').textContent = d.total_scans;
  document.getElementById('v-email').textContent = d.email_users;

  // Access requests table
  renderRequests(requests);

  // Users table
  const usersHtml = (d.users || []).map(u => {
    const joined = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    return `<tr><td>${esc(String(u.id))}</td><td>${esc(u.username)}</td><td>${esc(u.display_name||'')}</td><td>${esc(u.email||'—')}</td><td>${u.job_count}</td><td>${joined}</td></tr>`;
  }).join('');
  document.getElementById('userRows').innerHTML = usersHtml || '<tr><td colspan="6" style="text-align:center;color:#6c757d">No users</td></tr>';
}

function renderRequests(requests) {
  const html = (requests || []).map(r => {
    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    const badgeClass = 'badge-' + (r.status || 'pending');
    let actions = '';
    if (r.status === 'pending') {
      actions = `<button class="btn-sm btn-approve" onclick="approveReq(${r.id})">Approve</button><button class="btn-sm btn-reject" onclick="rejectReq(${r.id})">Reject</button>`;
    } else if (r.status === 'approved' && r.invite_token) {
      actions = `<span class="invite-link" id="link-${r.id}">${_baseUrl}/signup?token=${r.invite_token}</span>`;
    }
    return `<tr><td>${esc(r.name)}</td><td>${esc(r.email)}</td><td class="about-text">${esc(r.about||'')}</td><td>${date}</td><td><span class="badge ${badgeClass}">${r.status}</span></td><td>${actions}</td></tr>`;
  }).join('');
  document.getElementById('requestRows').innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:#6c757d">No requests yet</td></tr>';
}

async function approveReq(id) {
  try {
    const resp = await fetch(_baseUrl + '/api/admin/access-requests/' + id + '/approve', {
      method: 'POST', headers: getHeaders(), credentials: 'include'
    });
    if (!resp.ok) throw new Error('Failed to approve');
    const data = await resp.json();
    alert('Approved! Invite link:\n\n' + data.invite_url);
    fetchAll();
  } catch (e) { alert(e.message); }
}

async function rejectReq(id) {
  if (!confirm('Reject this request?')) return;
  try {
    const resp = await fetch(_baseUrl + '/api/admin/access-requests/' + id + '/reject', {
      method: 'POST', headers: getHeaders(), credentials: 'include'
    });
    if (!resp.ok) throw new Error('Failed to reject');
    fetchAll();
  } catch (e) { alert(e.message); }
}

function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// Auto-load if config exists
if (document.getElementById('apiUrl').value) {
  fetchAll();
}
</script>
</body>
</html>
