<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-briefcase" style="font-size: 2.5rem; color: #0d6efd;"></i>
                    <h4 class="mt-2 fw-bold">Job Tracker</h4>
                    <p class="text-muted small">Create your account</p>
                </div>

                {% if error %}
                <div class="alert alert-{{ 'danger' if not no_form else 'warning' }} py-2 small">{{ error }}</div>
                {% endif %}

                {% if no_form %}
                <div class="text-center mt-3">
                    <a href="/request-access" class="btn btn-primary btn-sm">Request Access</a>
                    <p class="text-muted small mt-2">Or <a href="/login">sign in</a> if you already have an account.</p>
                </div>
                {% else %}
                <form method="POST" action="/signup?token={{ token }}">
                    <input type="hidden" name="token" value="{{ token }}">
                    {% if invite %}
                    <div class="alert alert-success py-2 small mb-3">
                        <i class="bi bi-check-circle me-1"></i> Welcome, {{ invite.name }}! Set up your login below.
                    </div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="display_name" class="form-label">Display Name</label>
                        <input type="text" class="form-control" id="display_name" name="display_name"
                               value="{{ invite.name if invite else '' }}" placeholder="How should we greet you?">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-person-plus me-1"></i> Create Account
                    </button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Already have an account? <a href="/login">Sign in</a></small>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
